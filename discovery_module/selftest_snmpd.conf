# Minimal net-snmp agent config for a LOCAL loopback self-test only.
# Read-only community "public", restricted to localhost.
rocommunity public 127.0.0.1

# NOTE: this net-snmp Windows build won't honor a faked sysObjectID (both the
# `sysObjectID` directive and an `override ... objectid` collapse to .1.3), so
# the agent reports its real net-snmp enterprise OID and the discovery module
# classifies it as "unknown vendor" -- an honest end-to-end exercise of the
# real SNMP path. (Cisco/Fortinet parsing is unit-verified separately.)
sysDescr net-snmp self-test agent (loopback)
sysName lab-host-01
syslocation self-test
syscontact selftest@localhost
